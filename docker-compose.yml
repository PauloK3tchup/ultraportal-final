services:
  backend:
    build:
      context: ./ultraportal-backend
    container_name: ultraportal-backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
      - "30080:8000" # Porta alternativa para acesso externo (AWS)
    volumes:
      - ./ultraportal-backend:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

  frontend:
    build:
      context: ./ultraportal-frontend
    container_name: ultraportal-frontend
    command: sh -c "npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./ultraportal-frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # Configure a URL completa da API do backend
      # Em desenvolvimento local: http://backend:8000 (nome do serviço no docker)
      # Em produção AWS: http://seu-ip-ec2:30080
      VITE_API_URL: ${VITE_API_URL:http://44.210.145.2:30080}
      VITE_API_PORT: ${VITE_API_PORT:8000}
    depends_on:
      - backend
